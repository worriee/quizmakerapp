<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUON AI - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FCF6F5;
      color: #1a1a1a;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem;
      background: #7b9acc;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { font-size: 1rem; line-height: 1.5; color: #4a4a4a; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 12px;
      background: #7b9acc;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">T</div>
    <h1>You're offline</h1>
    <p>TUON AI needs an internet connection to generate notes, quizzes, and sync your sessions.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
